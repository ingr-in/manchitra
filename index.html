<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Manchitra</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (JSX support) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Leaflet (Open Map API) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family: Arial; }
    #map { height: 90vh; width: 100%; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

    const { useEffect } = React;

    function App() {

      useEffect(() => {

        // 🗺️ Leaflet Map init
        const map = L.map('map').setView([23.0339, 72.5850], 5);

        // 🌍 OpenStreetMap (Free API)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(map);

        // 🛰️ Satellite (ESRI free tiles)
        L.tileLayer(
          'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
          { attribution: 'Tiles © Esri' }
        ).addTo(map);

        // 📍 Marker
        L.marker([23.0339, 72.5850]).addTo(map)
          .bindPopup("Manchitra Start Point")
          .openPopup();

        // 🌐 Example API call (OpenCage / Nominatim alternative)
        fetch("https://nominatim.openstreetmap.org/search?format=json&q=Gujarat")
          .then(res => res.json())
          .then(data => {
            console.log("Geo API:", data);
          });

      }, []);

      return (
        <div>
          <h2 style={{padding:"10px"}}>Manchitra Map System</h2>
          <div id="map"></div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
